<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AM Enterprises — Digital Marketing & Software Agency Pakistan</title>

    <meta
      name="description"
      content="AM Enterprises is a leading digital marketing & software agency in Pakistan. We offer SEO, web development, social media marketing, Google Ads, and AI-powered business growth."
    />

    <meta
      name="keywords"
      content="digital marketing agency Pakistan, SEO services Pakistan, web development Pakistan, social media marketing, Google Ads Pakistan, AI automation, AM Enterprises"
    />

    <meta name="author" content="AM Enterprises" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://amenterprises.tech/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AM Enterprises" />
    <meta property="og:title" content="AM Enterprises — Digital Marketing & Software Agency Pakistan" />
    <meta
      property="og:description"
      content="Leading digital marketing & software agency in Pakistan offering SEO, web development, Google Ads, and AI automation services."
    />
    <meta property="og:url" content="https://amenterprises.tech/" />
    <meta property="og:image" content="https://amenterprises.tech/og-image.png" />
    <meta property="og:locale" content="en_PK" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AM Enterprises — Digital Marketing & Software Agency Pakistan" />
    <meta
      name="twitter:description"
      content="SEO, web development, Google Ads & AI automation services in Pakistan."
    />
    <meta name="twitter:image" content="https://amenterprises.tech/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AM Enterprises",
        "url": "https://amenterprises.tech",
        "logo": "https://amenterprises.tech/favicon.png",
        "founder": "Moez Rehman",
        "foundingDate": "2022",
        "telephone": "+92-317-3712950",
        "email": "hello@amenterprises.tech",
        "sameAs": [
          "https://www.facebook.com/amenterprises",
          "https://www.linkedin.com/company/amenterprises",
          "https://www.instagram.com/amenterprises"
        ],
        "address": [
          {
            "@type": "PostalAddress",
            "addressLocality": "Islamabad",
            "addressCountry": "PK"
          },
          {
            "@type": "PostalAddress",
            "addressLocality": "Rawat Technology Park",
            "addressCountry": "PK"
          }
        ]
      }
    </script>

    <!-- JSON-LD: Website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "AM Enterprises",
        "url": "https://amenterprises.tech",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://amenterprises.tech/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
